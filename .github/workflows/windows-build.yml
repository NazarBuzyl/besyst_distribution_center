name: Windows Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: JDK 17 einrichten
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Maven Build & jlink
        run: mvn clean package javafx:jlink --no-transfer-progress

      - name: WiX 3 in PATH eintragen
        run: |
          $wixPath = (Get-ChildItem "C:\Program Files (x86)\WiX Toolset*" | Sort-Object Name -Descending | Select-Object -First 1).FullName
          echo "$wixPath\bin" | Out-File -Append -FilePath $env:GITHUB_PATH
          echo "WIX=$wixPath\" | Out-File -Append -FilePath $env:GITHUB_ENV
          Write-Host "WiX gefunden: $wixPath"
        shell: powershell

      - name: jpackage ausführen (EXE erstellen)
        run: |
          jpackage `
            --type exe `
            --name "BESYST_Distribution_Center" `
            --app-version "1.0.0" `
            --vendor "Hochschule" `
            --app-image "target/BESYST" `
            --win-menu `
            --win-shortcut `
            --dest target/installer
        shell: powershell

      - name: Build-Artefakte hochladen
        uses: actions/upload-artifact@v4
        with:
          name: BESYST-Windows-Installer
          path: target/installer/*.exe
          retention-days: 30