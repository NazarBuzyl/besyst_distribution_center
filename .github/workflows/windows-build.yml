name: Windows Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: JDK 17 einrichten
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Maven Build
        run: mvn clean package --no-transfer-progress

      - name: jpackage ausführen (EXE erstellen)
        run: mvn javafx:jlink javafx:jpackage --no-transfer-progress

      - name: Build-Artefakte hochladen
        uses: actions/upload-artifact@v4
        with:
          name: BESYST-Windows-Installer
          path: |
            target/BESYST*.exe
            target/BESYST_Distribution_Center*.exe
          retention-days: 30