name: Windows JavaFX Build

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      - name: Build with Maven
        run: mvn clean package

      - name: Create Runtime Image (jlink)
        run: mvn javafx:jlink

      - name: Create Windows EXE
        run: mvn javafx:jpackage

      - name: Upload EXE Artifact
        uses: actions/upload-artifact@v4
        with:
          name: BESYST-Windows-EXE
          path: target/*.exe