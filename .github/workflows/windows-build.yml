name: Windows JavaFX Build

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      - name: Build JAR
        run: mvn clean package

      - name: Create Windows EXE
        run: |
          jpackage ^
            --input target ^
            --name BESYST_Distribution_Center ^
            --main-jar besyst_distribution_center-1.0.0.jar ^
            --main-class org.example.App ^
            --type exe

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: BESYST-Windows-EXE
          path: "*.exe"